name: Build and Push to ACR

on:
  push:
    branches:
      - main

# Permisos necesarios para OIDC
permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Reafirmar permisos a nivel de job
    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_NAME: python-hello-devsecops
      ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: |
          echo "Runner: $(uname -a)"
          echo "PWD: $(pwd)"
          echo "Files:"
          ls -la
          echo "ACR_NAME='${{ secrets.ACR_NAME }}'"

      # Prefer OIDC when AZURE_CLIENT_ID está configurado
      - name: Azure Login with OIDC
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          auth-type: oidc
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Fallback a Service Principal si no se usa OIDC y existe AZURE_CREDENTIALS
      - name: Azure Login with Service Principal (fallback)
        if: ${{ secrets.AZURE_CLIENT_ID == '' && secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure login (debug)
        run: |
          echo "Azure account (if logged in):"
          az account show || echo "Not logged in to Azure"

      - name: Login to ACR (via az)
        run: |
          if [ -z "${{ secrets.ACR_NAME }}" ]; then
            echo "ERROR: ACR_NAME secret is not set"; exit 1
          fi
          echo "Logging into ACR: ${{ secrets.ACR_NAME }}.azurecr.io"
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Show Docker info (debug)
        run: |
          docker version
          docker buildx version || true
          docker info || true

      - name: Build and push image (using docker/build-push-action)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Confirm image pushed (optional)
        run: |
          az acr repository show-tags --name "${{ secrets.ACR_NAME }}" --repository ${{ env.IMAGE_NAME }} --output table || true
