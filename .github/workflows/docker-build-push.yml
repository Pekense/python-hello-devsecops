name: Build and Push to ACR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: |
          echo "Runner: $(uname -a)"
          echo "PWD: $(pwd)"
          echo "Files:"
          ls -la
          echo "ACR_NAME='${{ secrets.ACR_NAME }}'"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          auth-type: oidc
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure login
        run: |
          az account show

      - name: Login to ACR (via az)
        run: |
          echo "Logging into ACR: ${{ secrets.ACR_NAME }}.azurecr.io"
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Show Docker info (debug)
        run: |
          docker version
          docker buildx version
          docker info

      - name: Build and push image (using docker/build-push-action)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_NAME }}.azurecr.io/python-hello-devsecops:latest
            ${{ secrets.ACR_NAME }}.azurecr.io/python-hello-devsecops:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Confirm image pushed (optional)
        run: |
          az acr repository show-tags --name "${{ secrets.ACR_NAME }}" --repository python-hello-devsecops --output table || true
