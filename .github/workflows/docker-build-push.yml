name: Build and Push to ACR

on:
  push:
    branches:
      - main

permissions:
  id-token: write # Crucial para OIDC
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: python-hello-devsecops
      ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR (Docker Login)
        run: |
          # Usamos un token de acceso de Azure CLI para loguear Docker directamente
          # Es más fiable para build-push-action que 'az acr login' en algunos runners
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Usamos cache-from y cache-to para acelerar builds futuros
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64

      - name: Confirm image pushed
        run: |
          az acr repository show-tags --name "${{ secrets.ACR_NAME }}" \
            --repository ${{ env.IMAGE_NAME }} --output table
