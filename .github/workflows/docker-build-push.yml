name: Build and Push to ACR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show workspace (debug)
        run: |
          echo "Runner: $(uname -a)"
          echo "PWD: $(pwd)"
          echo "Listing files:"
          ls -la
          echo "ACR_NAME='${{ secrets.ACR_NAME }}'"

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          auth-type: oidc
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure login
        run: |
          az account show

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to ACR (via az)
        run: |
          echo "Logging into ACR: ${{ secrets.ACR_NAME }}.azurecr.io"
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Show Docker info (debug)
        run: |
          docker version
          docker buildx version
          docker info

      - name: Build and push image (buildx)
        run: |
          echo "Building and pushing image to ACR..."
          docker buildx build --platform linux/amd64,linux/arm64 \
            --push \
            -t "${{ secrets.ACR_NAME }}.azurecr.io/python-hello-devsecops:latest" \
            .

      - name: Confirm image pushed (optional)
        run: |
          echo "Listing images in ACR (may require Azure CLI permissions)"
          az acr repository show-tags --name "${{ secrets.ACR_NAME }}" --repository python-hello-devsecops --output table || true

